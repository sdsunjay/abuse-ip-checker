repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.405
    hooks:
      - id: pyright
        additional_dependencies:
          - click>=8.1.7
          - pyyaml>=6.0
          - requests>=2.32.3
          - pytest
          - types-pyyaml
          - types-requests

  - repo: local
    hooks:
      - id: bandit
        name: bandit (uv)
        entry: uv tool run --from "bandit[toml]==1.9.4" bandit
        args: ["-q", "-c", "pyproject.toml", "-r", "src"]
        language: system
        pass_filenames: false
        types: [python]
